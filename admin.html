<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Panel - AfghanStore</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#F5C518;--bg:#07090D;--surface:#0F1117;--surface2:#161923;--border:rgba(255,255,255,0.08);--text:#E8EAF0;--muted:#6B7593;--success:#2ED573;--danger:#FF4757;--blue:#3D7EFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;padding:20px;}
.login-box{max-width:360px;margin:80px auto;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:20px;color:var(--gold);text-align:center;}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:11px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;margin-bottom:12px;}
input:focus{border-color:var(--gold);}
.btn{width:100%;padding:12px;background:var(--gold);border:none;border-radius:8px;color:#000;font-family:'Exo 2',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.btn:hover{opacity:.9;}
.admin-panel{max-width:900px;margin:0 auto;}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.admin-header h1{font-size:20px;font-weight:800;color:var(--gold);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.stat-n{font-size:26px;font-weight:800;color:var(--gold);}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.orders{display:flex;flex-direction:column;gap:10px;}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;}
.order-card.pending{border-right:3px solid orange;}
.order-card.completed{border-right:3px solid var(--success);opacity:.7;}
.order-card.cancelled{border-right:3px solid var(--danger);opacity:.6;}
.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.order-id{font-size:15px;font-weight:800;color:var(--gold);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;}
.badge.pending{background:rgba(255,165,0,0.15);color:orange;}
.badge.completed{background:rgba(46,213,115,0.15);color:var(--success);}
.badge.cancelled{background:rgba(255,71,87,0.15);color:var(--danger);}
.order-detail{font-size:12px;color:var(--muted);line-height:1.9;}
.order-detail strong{color:var(--text);}
.order-actions{display:flex;gap:8px;margin-top:12px;}
.action-btn{padding:8px 16px;border:none;border-radius:7px;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-complete{background:var(--success);color:#000;}
.btn-cancel{background:rgba(255,71,87,0.15);color:var(--danger);border:1px solid var(--danger);}
.btn-complete:hover{opacity:.9;}
.logout{background:rgba(255,71,87,0.1);border:1px solid var(--danger);color:var(--danger);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;}
.refresh-btn{background:var(--gold);border:none;border-radius:7px;padding:8px 16px;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.empty{text-align:center;padding:40px;color:var(--muted);}
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.ftab{padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;border:none;}
.ftab.active{background:var(--gold);color:#000;}
#loginBox{display:block;}
#adminBox{display:none;}
.err{color:var(--danger);font-size:12px;margin-top:8px;text-align:center;}
.new-order-btn{background:rgba(61,126,255,0.1);border:1px solid var(--blue);color:var(--blue);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;}
.modal.show{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:90%;max-width:420px;}
.modal-box h3{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px;}
.modal-box label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:7px;font-family:'Exo 2',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-save{background:var(--gold);color:#000;}
.btn-close{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
</style>
</head>
<body>

<div id="loginBox">
  <div class="login-box">
    <h2>🔐 ورود به پنل ادمین</h2>
    <input type="password" id="passInput" placeholder="رمز عبور" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn" onclick="login()">ورود</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="adminBox">
  <div class="admin-panel">
    <div class="admin-header">
      <h1>🛒 پنل مدیریت AfghanStore</h1>
      <div style="display:flex;gap:8px;">
        <button class="new-order-btn" onclick="showNewOrderModal()">➕ سفارش جدید</button>
        <button class="refresh-btn" onclick="loadOrders()">🔄 بروزرسانی</button>
        <button class="logout" onclick="logout()">خروج</button>
      </div>
    </div>
    <div class="stats" id="statsBox"></div>
    <div class="filter-tabs">
      <button class="ftab active" onclick="filterOrders('all',this)">همه</button>
      <button class="ftab" onclick="filterOrders('pending',this)">⏳ در انتظار</button>
      <button class="ftab" onclick="filterOrders('completed',this)">✅ تکمیل شده</button>
      <button class="ftab" onclick="filterOrders('cancelled',this)">❌ لغو شده</button>
    </div>
    <div class="orders" id="ordersBox"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>➕ افزودن سفارش دستی</h3>
    <label>شناسه سفارش</label>
    <input type="text" id="m_id" placeholder="AG-000001"/>
    <label>بازی</label>
    <input type="text" id="m_game" placeholder="PUBG Mobile"/>
    <label>پکیج</label>
    <input type="text" id="m_pkg" placeholder="1800 UC"/>
    <label>Player ID</label>
    <input type="text" id="m_pid" placeholder="123456789"/>
    <label>روش پرداخت</label>
    <input type="text" id="m_pay" placeholder="PayPal"/>
    <label>مبلغ (USD)</label>
    <input type="number" id="m_price" placeholder="27.99"/>
    <div class="modal-btns">
      <button class="btn-save" onclick="saveManualOrder()">ذخیره</button>
      <button class="btn-close" onclick="closeModal()">بستن</button>
    </div>
  </div>
</div>

<script>
const PASS = 'afghan2025';
let orders = JSON.parse(localStorage.getItem('admin_orders') || '[]');
let filter = 'all';

function login() {
  const p = document.getElementById('passInput').value;
  if(p === PASS || p === (localStorage.getItem('admin_pass') || PASS)) {
    document.getElementById('loginBox').style.display='none';
    document.getElementById('adminBox').style.display='block';
    loadOrders();
  } else {
    document.getElementById('loginErr').textContent = '❌ رمز عبور اشتباه است';
  }
}

function logout() {
  document.getElementById('loginBox').style.display='block';
  document.getElementById('adminBox').style.display='none';
  document.getElementById('passInput').value='';
}

function loadOrders() {
  // Load from localStorage
  orders = JSON.parse(localStorage.getItem('admin_orders') || '[]');
  renderStats();
  renderOrders();
}

function renderStats() {
  const tot = orders.length;
  const pen = orders.filter(o=>o.status==='pending').length;
  const com = orders.filter(o=>o.status==='completed').length;
  document.getElementById('statsBox').innerHTML = `
    <div class="stat"><div class="stat-n">${tot}</div><div class="stat-l">کل سفارش</div></div>
    <div class="stat"><div class="stat-n" style="color:orange;">${pen}</div><div class="stat-l">در انتظار</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--success);">${com}</div><div class="stat-l">تکمیل شده</div></div>
  `;
}

function filterOrders(f, btn) {
  filter = f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const filtered = filter==='all' ? orders : orders.filter(o=>o.status===filter);
  const box = document.getElementById('ordersBox');
  const statusLabel = {pending:'⏳ در انتظار',completed:'✅ تکمیل',cancelled:'❌ لغو'};
  if(!filtered.length) {
    box.innerHTML = '<div class="empty">📭 سفارشی وجود ندارد</div>';
    return;
  }
  box.innerHTML = filtered.map(o=>`
    <div class="order-card ${o.status}">
      <div class="order-top">
        <span class="order-id">${o.id}</span>
        <span class="badge ${o.status}">${statusLabel[o.status]||o.status}</span>
      </div>
      <div class="order-detail">
        🎮 <strong>${o.game}</strong> — ${o.pkg}<br/>
        👤 Player ID: <strong>${o.playerId||o.pid||'-'}</strong><br/>
        💰 مبلغ: <strong style="color:var(--gold);">$${parseFloat(o.price||0).toFixed(2)}</strong><br/>
        💳 پرداخت: <strong>${o.payment||'-'}</strong><br/>
        📅 <strong>${o.createdAt ? new Date(o.createdAt).toLocaleString('fa-IR') : o.date||'-'}</strong>
        ${o.completedAt ? `<br/>✅ تکمیل: <strong>${new Date(o.completedAt).toLocaleString('fa-IR')}</strong>` : ''}
      </div>
      ${o.status!=='completed'&&o.status!=='cancelled'?`
      <div class="order-actions">
        <button class="action-btn btn-complete" onclick="updateOrder('${o.id}','completed')">✅ تکمیل کردم</button>
        <button class="action-btn btn-cancel" onclick="updateOrder('${o.id}','cancelled')">❌ لغو</button>
      </div>`:''}
    </div>
  `).join('');
}

function updateOrder(id, status) {
  const label = status==='completed'?'تکمیل':'لغو';
  if(!confirm(`سفارش ${id} را ${label} کنید؟`)) return;
  const idx = orders.findIndex(o=>o.id===id);
  if(idx>=0) {
    orders[idx].status = status;
    if(status==='completed') orders[idx].completedAt = new Date().toISOString();
    localStorage.setItem('admin_orders', JSON.stringify(orders));
    renderStats();
    renderOrders();

    // Send Telegram notification
    const token = '7634398182:AAH_VVcSUmvDTqtQyjer7G_YsAAAydg4zWs';
    const chatId = '221207676';
    const msg = status==='completed'
      ? `✅ سفارش ${id} تکمیل شد!\n👤 Player ID: ${orders[idx].playerId||'-'}\n💎 ${orders[idx].pkg}`
      : `❌ سفارش ${id} لغو شد.`;
    fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({chat_id: chatId, text: msg})
    }).catch(()=>{});
  }
}

function showNewOrderModal() {
  document.getElementById('modal').classList.add('show');
  const nextId = 'AG-' + String(orders.length+1).padStart(6,'0');
  document.getElementById('m_id').value = nextId;
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function saveManualOrder() {
  const order = {
    id: document.getElementById('m_id').value || 'AG-'+Date.now(),
    game: document.getElementById('m_game').value,
    pkg: document.getElementById('m_pkg').value,
    playerId: document.getElementById('m_pid').value,
    payment: document.getElementById('m_pay').value,
    price: document.getElementById('m_price').value,
    status: 'pending',
    createdAt: new Date().toISOString()
  };
  orders.unshift(order);
  localStorage.setItem('admin_orders', JSON.stringify(orders));
  closeModal();
  renderStats();
  renderOrders();
}

// Auto-sync orders from main site
window.addEventListener('storage', function(e) {
  if(e.key === 'ag_orders') {
    const newOrders = JSON.parse(e.newValue || '[]');
    newOrders.forEach(no => {
      if(!orders.find(o=>o.id===no.id)) {
        orders.unshift(no);
      }
    });
    localStorage.setItem('admin_orders', JSON.stringify(orders));
    renderStats();
    renderOrders();
  }
});

// Initial sync
const siteOrders = JSON.parse(localStorage.getItem('ag_orders') || '[]');
siteOrders.forEach(so => {
  if(!orders.find(o=>o.id===so.id)) orders.push(so);
});
if(siteOrders.length) localStorage.setItem('admin_orders', JSON.stringify(orders));
</script>
</body>
</html>
