<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Panel - AfghanStore</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#F5C518;--bg:#07090D;--surface:#0F1117;--surface2:#161923;--border:rgba(255,255,255,0.08);--text:#E8EAF0;--muted:#6B7593;--success:#2ED573;--danger:#FF4757;--blue:#3D7EFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;padding:20px;}
.login-box{max-width:360px;margin:100px auto;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:20px;color:var(--gold);}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:11px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;margin-bottom:12px;}
input:focus{border-color:var(--gold);}
.btn{width:100%;padding:12px;background:var(--gold);border:none;border-radius:8px;color:#000;font-family:'Exo 2',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.admin-panel{max-width:1000px;margin:0 auto;}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.admin-header h1{font-size:22px;font-weight:800;color:var(--gold);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.stat-n{font-size:26px;font-weight:800;color:var(--gold);}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.orders{display:flex;flex-direction:column;gap:12px;}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
.order-card.pending{border-right:3px solid orange;}
.order-card.processing{border-right:3px solid var(--blue);}
.order-card.completed{border-right:3px solid var(--success);opacity:.7;}
.order-card.cancelled{border-right:3px solid var(--danger);opacity:.6;}
.order-info{flex:1;}
.order-id{font-size:16px;font-weight:800;color:var(--gold);}
.order-detail{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.8;}
.order-detail strong{color:var(--text);}
.order-actions{display:flex;flex-direction:column;gap:8px;min-width:130px;}
.action-btn{padding:8px 14px;border:none;border-radius:7px;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-complete{background:var(--success);color:#000;}
.btn-cancel{background:rgba(255,71,87,0.15);color:var(--danger);border:1px solid var(--danger);}
.btn-complete:hover{transform:scale(1.03);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;}
.badge.pending{background:rgba(255,165,0,0.15);color:orange;}
.badge.processing{background:rgba(61,126,255,0.15);color:var(--blue);}
.badge.completed{background:rgba(46,213,115,0.15);color:var(--success);}
.badge.cancelled{background:rgba(255,71,87,0.15);color:var(--danger);}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
.logout{background:rgba(255,71,87,0.1);border:1px solid var(--danger);color:var(--danger);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;}
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;}
.ftab{padding:7px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;}
.ftab.active{background:var(--gold);border-color:var(--gold);color:#000;}
#loginBox{display:block;}
#adminBox{display:none;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login-box">
    <h2>🔐 ورود به پنل ادمین</h2>
    <input type="password" id="passInput" placeholder="رمز عبور" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn" onclick="login()">ورود</button>
    <div id="loginErr" style="color:var(--danger);font-size:12px;margin-top:10px;text-align:center;"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminBox">
  <div class="admin-panel">
    <div class="admin-header">
      <h1>🛒 پنل مدیریت سفارشات</h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <button onclick="loadOrders()" style="background:var(--gold);border:none;border-radius:7px;padding:8px 16px;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">🔄 بروزرسانی</button>
        <button class="logout" onclick="logout()">خروج</button>
      </div>
    </div>
    <div class="stats" id="statsBox"></div>
    <div class="filter-tabs">
      <button class="ftab active" onclick="filterOrders('all',this)">همه</button>
      <button class="ftab" onclick="filterOrders('pending',this)">⏳ در انتظار</button>
      <button class="ftab" onclick="filterOrders('processing',this)">🔄 در حال پردازش</button>
      <button class="ftab" onclick="filterOrders('completed',this)">✅ تکمیل شده</button>
    </div>
    <div class="orders" id="ordersBox"></div>
  </div>
</div>

<script>
let adminPass = '';
let allOrders = [];
let currentFilter = 'all';

function login() {
  const p = document.getElementById('passInput').value;
  if(!p) return;
  adminPass = p;
  document.getElementById('loginErr').textContent = '';
  loadOrders();
}

function logout() {
  adminPass = '';
  document.getElementById('loginBox').style.display='block';
  document.getElementById('adminBox').style.display='none';
  document.getElementById('passInput').value='';
}

async function loadOrders() {
  try {
    const res = await fetch(`/.netlify/functions/admin-orders?password=${encodeURIComponent(adminPass)}`);
    if(res.status === 401) {
      document.getElementById('loginErr').textContent = '❌ رمز عبور اشتباه است';
      return;
    }
    const data = await res.json();
    allOrders = Array.isArray(data) ? data : [];
    document.getElementById('loginBox').style.display='none';
    document.getElementById('adminBox').style.display='block';
    renderStats();
    renderOrders();
    // Auto-refresh every 30 seconds
    setTimeout(loadOrders, 30000);
  } catch(e) {
    document.getElementById('loginErr').textContent = '❌ خطا در اتصال به سرور';
  }
}

function renderStats() {
  const total = allOrders.length;
  const pending = allOrders.filter(o=>o.status==='pending').length;
  const completed = allOrders.filter(o=>o.status==='completed').length;
  const revenue = allOrders.filter(o=>o.status==='completed').reduce((s,o)=>s+parseFloat(o.price||0),0);
  document.getElementById('statsBox').innerHTML = `
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">کل سفارش</div></div>
    <div class="stat"><div class="stat-n" style="color:orange;">${pending}</div><div class="stat-l">در انتظار</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--success);">${completed}</div><div class="stat-l">تکمیل شده</div></div>
    <div class="stat"><div class="stat-n">$${revenue.toFixed(2)}</div><div class="stat-l">درآمد</div></div>
  `;
}

function filterOrders(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const filtered = currentFilter==='all' ? allOrders : allOrders.filter(o=>o.status===currentFilter);
  const box = document.getElementById('ordersBox');
  const statusLabel = {pending:'در انتظار',processing:'در حال پردازش',completed:'تکمیل شده',cancelled:'لغو شده'};
  if(!filtered.length) {
    box.innerHTML = '<div class="empty">📭 سفارشی وجود ندارد</div>';
    return;
  }
  box.innerHTML = filtered.map(o => `
    <div class="order-card ${o.status}" id="card-${o.id}">
      <div class="order-info">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span class="order-id">${o.id}</span>
          <span class="badge ${o.status}">${statusLabel[o.status]||o.status}</span>
        </div>
        <div class="order-detail">
          🎮 <strong>${o.game}</strong> — ${o.pkg}<br/>
          👤 Player ID: <strong>${o.playerId}</strong><br/>
          💰 مبلغ: <strong style="color:var(--gold);">$${o.price}</strong><br/>
          💳 پرداخت: <strong>${o.payment}</strong><br/>
          📅 تاریخ: <strong>${new Date(o.createdAt).toLocaleString('fa-IR')}</strong>
          ${o.completedAt ? `<br/>✅ تکمیل: <strong>${new Date(o.completedAt).toLocaleString('fa-IR')}</strong>` : ''}
        </div>
      </div>
      <div class="order-actions">
        ${o.status!=='completed' && o.status!=='cancelled' ? `
          <button class="action-btn btn-complete" onclick="updateOrder('${o.id}','completed')">✅ تکمیل</button>
          <button class="action-btn btn-cancel" onclick="updateOrder('${o.id}','cancelled')">❌ لغو</button>
        ` : `<div style="font-size:11px;color:var(--muted);text-align:center;">${o.status==='completed'?'✅ تکمیل شد':'❌ لغو شد'}</div>`}
      </div>
    </div>
  `).join('');
}

async function updateOrder(orderId, status) {
  const label = status==='completed' ? 'تکمیل' : 'لغو';
  if(!confirm(`آیا مطمئن هستید که سفارش ${orderId} را ${label} کنید؟`)) return;
  try {
    const res = await fetch('/.netlify/functions/update-order', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ orderId, status, password: adminPass })
    });
    const data = await res.json();
    if(data.success) {
      const idx = allOrders.findIndex(o=>o.id===orderId);
      if(idx>=0) { allOrders[idx].status=status; if(status==='completed') allOrders[idx].completedAt=new Date().toISOString(); }
      renderStats();
      renderOrders();
    }
  } catch(e) { alert('خطا در بروزرسانی'); }
}
</script>
</body>
</html>
